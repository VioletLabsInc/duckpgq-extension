#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-next-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: duckpgq
      exclude_archs: 'wasm_mvp;wasm_eh;wasm_threads;windows_amd64;windows_amd64_mingw;windows_arm64'

  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      override_duckdb_repository: https://github.com/VioletLabsInc/duckdb-pgq.git
      duckdb_version: v1.5.3
      ci_tools_version: v1.5-variegata
      extension_name: duckpgq
      exclude_archs: 'wasm_mvp;wasm_eh;wasm_threads;windows_amd64;windows_amd64_mingw;windows_arm64'

  code-quality-check:
    name: Code Quality Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.3
      ci_tools_version: v1.5-variegata
      extension_name: duckpgq
      format_checks: 'format;tidy'

  publish-extension-repository:
    name: Publish extension repository (GitHub Pages)
    needs: duckdb-stable-build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
      actions: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: duckpgq-v1.5.3-extension-*
          path: artifacts
          merge-multiple: false

      - name: Build static repository layout
        run: |
          set -euo pipefail
          mkdir -p repo/v1.5.3
          for artifact_dir in artifacts/*/; do
            name="$(basename "$artifact_dir")"
            arch="${name##*-extension-}"
            case "$arch" in
              linux_arm64|linux_amd64|osx_arm64|osx_amd64|windows_amd64|windows_arm64)
                ext="$(find "$artifact_dir" -name 'duckpgq.duckdb_extension' | head -1)"
                if [ -n "$ext" ]; then
                  mkdir -p "repo/v1.5.3/$arch"
                  gzip -c "$ext" > "repo/v1.5.3/$arch/duckpgq.duckdb_extension.gz"
                  echo "Published v1.5.3/$arch/duckpgq.duckdb_extension.gz"
                fi
                ;;
            esac
          done
          find repo -type f

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
